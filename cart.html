<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin/supabase.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#111;
  color:white;
  padding:20px;
}

.container{
  max-width:1100px;
  margin:auto;
}

h1{
  font-size:clamp(32px,5vw,50px);
  margin-bottom:30px;
}

.item{
  display:flex;
  gap:20px;
  margin-bottom:24px;
  align-items:center;
  background:#1a1a1a;
  padding:18px;
  border-radius:16px;
}

.item img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:12px;
}

.item h3{
  font-size:clamp(20px,3vw,28px);
  margin-bottom:8px;
}

.item p{
  font-size:18px;
  margin-bottom:10px;
}

button{
  padding:14px 18px;
  cursor:pointer;
  border:none;
  border-radius:10px;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.03);
  opacity:0.9;
}

.total{
  font-size:clamp(24px,4vw,36px);
  margin-top:30px;
  margin-bottom:20px;
  font-weight:bold;
}

.checkout-btn{
  width:100%;
  padding:18px;
  font-size:18px;
}

@media (max-width:700px){

  body{
    padding:14px;
  }

  .item{
    flex-direction:column;
    text-align:center;
    padding:16px;
  }

  .item img{
    width:100%;
    max-width:260px;
    height:auto;
  }

  .checkout-btn{
    font-size:16px;
    padding:16px;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>Your Cart</h1>

<div id="cart"></div>

<div class="total" id="total"></div>

<button class="checkout-btn" onclick="checkout()">
Checkout
</button>

</div>

<script>
async function loadCart() {

  let cart = JSON.parse(localStorage.getItem("cart") || "[]");

  if (cart.length === 0) {
    document.getElementById("cart").innerHTML = "Cart is empty";
    return;
  }

  const { data } = await sb.from("products").select("*");

  let items = data.filter(p => cart.includes(p.id));

  let total = 0;

  document.getElementById("cart").innerHTML = items.map(p => {

    total += Number(p.price);

    return `
      <div class="item">
        <img src="${p.main_image}">
        <div>
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
          <button onclick="removeItem('${p.id}')">Remove</button>
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("total").innerText =
    "Total: $" + total.toFixed(2);
}

function removeItem(id) {

  let cart = JSON.parse(localStorage.getItem("cart") || "[]");

  cart = cart.filter(i => i !== id);

  localStorage.setItem("cart", JSON.stringify(cart));

  loadCart();
}

function checkout() {
  window.location.href = "checkout.html";
}

loadCart();
</script>

</body>
</html>
