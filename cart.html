<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin/supabase.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; padding:20px; }
.container { max-width:800px; margin:auto; }
.item { display:flex; gap:15px; margin-bottom:20px; align-items:center; }
.item img { width:80px; border-radius:6px; }
button { padding:10px; cursor:pointer; color:Black;}
.total { font-size:20px; margin-top:20px; }
</style>
</head>

<body>

<div class="container">
<h1>Your Cart</h1>

<div id="cart"></div>

<div class="total" id="total"></div>

<button onclick="checkout()">Checkout</button>
</div>

<script>
async function loadCart() {
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");

  if (cart.length === 0) {
    document.getElementById("cart").innerHTML = "Cart is empty";
    return;
  }

  const { data } = await sb.from("products").select("*");

  let items = data.filter(p => cart.includes(p.id));

  let total = 0;

  document.getElementById("cart").innerHTML = items.map(p => {
    total += Number(p.price);
    return `
      <div class="item">
        <img src="${p.main_image}">
        <div>
          <h3>${p.name}</h3>
          <p>$${p.price}</p>
          <button onclick="removeItem('${p.id}')">Remove</button>
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("total").innerText = "Total: $" + total;
}

function removeItem(id) {
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");
  cart = cart.filter(i => i !== id);
  localStorage.setItem("cart", JSON.stringify(cart));
  loadCart();
}

function checkout() {
  window.location.href = "checkout.html";
}

loadCart();
</script>

</body>
</html>
