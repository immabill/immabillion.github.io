<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body {
  font-family: Arial;
  background:#0d0d0d;
  color:white;
  padding:20px;
}

.container {
  max-width:1000px;
  margin:auto;
}

input, textarea {
  display:block;
  margin:10px 0;
  padding:10px;
  width:300px;
  background:#1a1a1a;
  border:none;
  color:white;
}

button {
  padding:10px;
  margin:5px;
  cursor:pointer;
  border:none;
  background:white;
  color:black;
  border-radius:5px;
}

.card {
  background:#1a1a1a;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.row {
  display:flex;
  gap:15px;
  align-items:center;
}

img {
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>
<button onclick="logout()">Logout</button>

<hr>

<h2>Add Product</h2>

<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input id="price" type="number" placeholder="Price">
<input id="stock" type="number" placeholder="Stock">
<input type="file" id="imageFile" multiple>

<button onclick="addProduct()">Add Product</button>

<h2>Products</h2>
<div id="list"></div>

<h2>Orders</h2>
<div id="orders"></div>

</div>

<script>
let sbClient = sb;

/*AUTH*/
async function logout() {
  await sbClient.auth.signOut();
  window.location.href = "login.html";
}

/*IMAGE UPLOAD*/
async function uploadImages(files) {
  let urls = [];

  for (let file of files) {
    const fileName = `${Date.now()}-${Math.random()}-${file.name}`;

    const { error } = await sbClient.storage
      .from("product-images")
      .upload(fileName, file);

    if (error) {
      console.error("Upload error:", error.message);
      continue;
    }

    const { data } = sbClient.storage
      .from("product-images")
      .getPublicUrl(fileName);

    urls.push(data.publicUrl);
  }

  return urls;
}

/*ADD PRODUCT*/
async function addProduct() {
  const files = document.getElementById("imageFile").files;

  let mainImage = null;
  let extras = [];

  if (files.length > 0) {
    const uploaded = await uploadImages(files);

    if (!uploaded.length) {
      alert("Image upload failed");
      return;
    }

    mainImage = uploaded[0];
    extras = uploaded.slice(1);
  }

  const product = {
    name: document.getElementById("name").value,
    description: document.getElementById("desc").value,
    price: Number(document.getElementById("price").value),
    stock: Number(document.getElementById("stock").value || 0),
    main_image: mainImage,
    images: extras
  };

  const { error } = await sbClient.from("products").insert([product]);

  if (error) {
    console.error(error);
    alert(error.message);
    return;
  }

  loadProducts();
}

/*LOAD PRODUCTS*/
async function loadProducts() {
  const { data, error } = await sbClient.from("products").select("*");

  if (error) {
    console.error(error);
    return;
  }

  const list = document.getElementById("list");

  list.innerHTML = (data || []).map(p => `
    <div class="card row">
      <img src="${p.main_image || ''}">
      <div>
        <h3>${p.name || 'No name'}</h3>
        <p>$${p.price || 0}</p>
        <p>Stock: ${p.stock ?? 0}</p>

        <button onclick="del('${p.id}', '${p.main_image || ''}')">Delete</button>
      </div>
    </div>
  `).join("");
}

/*DELETE PRODUCT*/
async function del(id, imageUrl) {

  console.log("Deleting:", { id, imageUrl });

  // 1. DELETE DB ROW
  const { error } = await sb.from("products").delete().eq("id", id);

  if (error) {
    console.error("DB delete failed:", error.message);
    return;
  }

  // 2. DELETE IMAGE (SAFE PARSING)
  if (imageUrl) {
    try {
      const match = imageUrl.match(/product-images\/(.+)$/);

      if (!match) {
        console.error("Could not parse image path:", imageUrl);
        return;
      }

      const filePath = match[1];

      const { error: storageError } = await sb.storage
        .from("product-images")
        .remove([filePath]);

      if (storageError) {
        console.error("Storage delete failed:", storageError.message);
      }

    } catch (e) {
      console.error("Delete crash:", e);
    }
  }

  loadProducts();
}

/*LOAD ORDERS*/
async function loadOrders() {
  const { data } = await sbClient.from("orders")
    .select("*")
    .order("created_at", { ascending:false });

  const orders = document.getElementById("orders");

  orders.innerHTML = (data || []).map(o => `
    <div class="card">
      <h3>${o.name || 'Customer'}</h3>
      <p>${o.email || ''}</p>
      <p>Total: $${o.total || 0}</p>
      <p>Status: ${o.status || 'pending'}</p>

      <button onclick="markShipped('${o.id}')">Mark Shipped</button>
    </div>
  `).join("");
}

/*MARK SHIPPED*/
async function markShipped(id) {
  await sbClient.from("orders")
    .update({ status: "shipped" })
    .eq("id", id);

  loadOrders();
}

/*INIT*/
loadProducts();
loadOrders();
</script>

</body>
</html>
