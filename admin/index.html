<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<style>
body {
  font-family: Arial;
  background:#0d0d0d;
  color:white;
  padding:20px;
}

.container {
  max-width:1000px;
  margin:auto;
}

input, textarea {
  display:block;
  margin:10px 0;
  padding:10px;
  width:300px;
  background:#1a1a1a;
  border:none;
  color:white;
}

button {
  padding:10px;
  margin:5px;
  cursor:pointer;
  border:none;
  background:white;
  color:black;
  border-radius:5px;
}

.card {
  background:#1a1a1a;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

.row {
  display:flex;
  gap:15px;
  align-items:center;
  flex-wrap:wrap;
}

img {
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="container">

<h1>Admin Dashboard</h1>
<button onclick="logout()">Logout</button>

<hr>

<h2>Add Product</h2>

<input id="product_name" placeholder="Name">
<textarea id="product_desc" placeholder="Description"></textarea>
<input id="product_price" type="number" placeholder="Price">
<input id="product_stock" type="number" placeholder="Stock">
<input type="file" id="imageFile" multiple>

<button onclick="addProduct()">Add Product</button>

<h2>Products</h2>
<div id="list"></div>

<hr>

<h2>Orders</h2>
<div id="orders"></div>

</div>

<!-- EDIT MODAL -->
<div id="editBox" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#000a;padding:40px;">
  <div style="background:#1a1a1a;padding:20px;max-width:600px;max-height:90vh;overflow:auto;">
    <h3>Edit Product</h3>

    <input id="edit_name">
    <textarea id="edit_desc"></textarea>
    <input id="edit_price" type="number">
    <input id="edit_stock" type="number">

    <h4>Main Image</h4>
    <img id="edit_main_preview" style="width:120px;height:120px;object-fit:cover;">

    <h4>Gallery</h4>
    <div id="edit_gallery"></div>

    <input type="file" id="edit_upload" multiple>

    <button onclick="uploadNewImages()">Upload New Images</button>
    <button onclick="saveEdit()">Save</button>
    <button onclick="closeEdit()">Close</button>
  </div>
</div>

<script>

let editingId = null;
let editingProduct = null;

/* AUTH */
async function logout() {
  await sb.auth.signOut();
  window.location.href = "login.html";
}

/* UPLOAD IMAGES */
async function uploadImages(files) {
  let urls = [];

  for (let file of files) {
    const fileName = `${Date.now()}-${file.name}`;

    await sb.storage
      .from("product-images")
      .upload(fileName, file);

    const { data } = sb.storage
      .from("product-images")
      .getPublicUrl(fileName);

    urls.push(data.publicUrl);
  }

  return urls;
}

/* ADD PRODUCT */
async function addProduct() {

  const name = product_name.value.trim();
  const description = product_desc.value.trim();
  const price = Number(product_price.value);
  const stock = Number(product_stock.value || 0);

  if (!name) {
    alert("Product name is required");
    return;
  }

  let uploaded = [];

  if (imageFile.files.length > 0) {
    uploaded = await uploadImages(imageFile.files);
  }

  const product = {
    name,
    description,
    price,
    stock,
    main_image: uploaded[0] || null,
    extra_images: uploaded.slice(1)
  };

  const { error } = await sb.from("products").insert([product]);

  if (error) {
    alert(error.message);
    return;
  }

  product_name.value = "";
  product_desc.value = "";
  product_price.value = "";
  product_stock.value = "";
  imageFile.value = "";

  loadProducts();
}

/* LOAD PRODUCTS */
async function loadProducts() {

  const { data } = await sb.from("products").select("*");

  list.innerHTML = (data || []).map(p => `
    <div class="card row">
      <img src="${p.main_image || ''}">
      <div>
        <h3>${p.name}</h3>
        <p>$${p.price}</p>
        <p>Stock: ${p.stock}</p>

        <button onclick="openEdit('${p.id}')">Edit</button>
        <button onclick="deleteProduct('${p.id}')">Delete</button>
      </div>
    </div>
  `).join("");
}

/* DELETE PRODUCT */
async function deleteProduct(id) {
  await sb.from("products").delete().eq("id", id);
  loadProducts();
}

/* OPEN EDIT */
async function openEdit(id) {

  editingId = id;

  const { data } = await sb.from("products")
    .select("*")
    .eq("id", id)
    .single();

  editingProduct = data;

  edit_name.value = data.name;
  edit_desc.value = data.description;
  edit_price.value = data.price;
  edit_stock.value = data.stock;

  renderEditImages();
  editBox.style.display = "block";
}

/* RENDER IMAGES */
function renderEditImages() {

  const main = editingProduct.main_image;
  const extras = editingProduct.extra_images || [];

  edit_main_preview.src = main || "";

  const all = [main, ...extras].filter(Boolean);

  edit_gallery.innerHTML = all.map(url => `
    <img src="${url}">
  `).join("");
}

/* SAVE EDIT */
async function saveEdit() {

  await sb.from("products").update({
    name: edit_name.value,
    description: edit_desc.value,
    price: Number(edit_price.value),
    stock: Number(edit_stock.value)
  }).eq("id", editingId);

  closeEdit();
  loadProducts();
}

/* CLOSE EDIT */
function closeEdit() {
  editBox.style.display = "none";
}

/* LOAD ORDERS (FIXED WITH ADDRESS) */
async function loadOrders() {

  const { data } = await sb.from("orders")
    .select("*")
    .order("created_at", { ascending:false });

  orders.innerHTML = (data || []).map(o => {

    const items = Array.isArray(o.items)
      ? o.items.map(i => i.name).join(", ")
      : "";

    return `
      <div class="card">
        <h3>${o.name || "No Name"}</h3>
        <p>Email: ${o.email || ""}</p>

        <p>Address: ${o.address || "No address provided"}</p>

        <p>Total: $${o.total || 0}</p>
        <p>Items: ${items}</p>
        <p>Status: ${o.status || "pending"}</p>

        <button onclick="shipOrder('${o.id}')">Mark Shipped</button>
        <button onclick="deleteOrder('${o.id}')">Delete</button>
      </div>
    `;
  }).join("");
}

/* SHIP ORDER */
async function shipOrder(id) {
  await sb.from("orders")
    .update({ status:"shipped" })
    .eq("id", id);

  loadOrders();
}

/* DELETE ORDER */
async function deleteOrder(id) {
  await sb.from("orders").delete().eq("id", id);
  loadOrders();
}

/* INIT */
loadProducts();
loadOrders();

</script>

</body>
</html>
