<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background:#111; color:white; }
    input, textarea { display:block; margin:10px 0; padding:8px; width:300px; }
    .card { border:1px solid #333; padding:10px; margin:10px 0; }
    img { width:80px; }
    button { margin:5px; }
  </style>
</head>

<body>

<h1>Inventory System</h1>
<button onclick="logout()">Logout</button>

<hr>

<h2>Add Product</h2>

<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input id="price" type="number" placeholder="Price">
<input id="stock" type="number" placeholder="Stock">
<input type="file" id="imageFile" multiple>

<button onclick="addProduct()">Add</button>

<h2>Products</h2>
<div id="list"></div>

<div id="editor" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);padding:40px;">
  <div style="background:#222;padding:20px;max-width:400px;">
    <h3>Edit Product</h3>

    <input id="edit_name" placeholder="Name">
    <textarea id="edit_desc" placeholder="Description"></textarea>
    <input id="edit_price" type="number" placeholder="Price">
    <input id="edit_stock" type="number" placeholder="Stock">

    <button onclick="saveEdit()">Save</button>
    <button onclick="closeEditor()">Close</button>
  </div>
</div>

<script>
let editingId = null;

async function checkAuth() {
  const { data } = await sb.auth.getUser();
  if (!data.user) window.location.href = "login.html";
}
checkAuth();

async function uploadImages(files) {
  let urls = [];

  for (let file of files) {
    const fileName = Date.now() + "-" + file.name;

    await sb.storage
      .from("product-images")
      .upload(fileName, file);

    const { data } = sb.storage
      .from("product-images")
      .getPublicUrl(fileName);

    urls.push(data.publicUrl);
  }

  return urls;
}

async function addProduct() {
  const files = imageFile.files;
  const images = files.length ? await uploadImages(files) : [];

  const product = {
    name: document.getElementById("name").value,
    description: document.getElementById("desc").value,
    price: Number(document.getElementById("price").value),
    stock: Number(document.getElementById("stock").value || 0),
    main_image: images[0] || null,
    images: images
  };

  const { error } = await sb.from("products").insert([product]);

  if (error) {
    console.error(error);
    alert("Failed to add product");
    return;
  }

  load();
}

async function load() {
  const { data } = await sb.from("products").select("*");

  list.innerHTML = data.map(p => `
    <div class="card">
      <img src="${p.main_image || ''}">
      <h3>${p.name}</h3>
      <p>${p.description || ''}</p>
      <p>Price: $${p.price}</p>
      <p>Stock: ${p.stock}</p>

      <button onclick="openEditor('${p.id}')">Edit</button>
      <button onclick="del('${p.id}','${p.main_image || ''}')">Delete</button>
    </div>
  `).join("");
}

async function openEditor(id) {
  editingId = id;

  const { data } = await sb
    .from("products")
    .select("*")
    .eq("id", id)
    .single();

  edit_name.value = data.name;
  edit_desc.value = data.description;
  edit_price.value = data.price;
  edit_stock.value = data.stock;

  document.getElementById("editor").style.display = "block";
}

function closeEditor() {
  document.getElementById("editor").style.display = "none";
}

async function saveEdit() {
  await sb.from("products").update({
    name: edit_name.value,
    description: edit_desc.value,
    price: Number(edit_price.value),
    stock: Number(edit_stock.value)
  }).eq("id", editingId);

  closeEditor();
  load();
}

async function del(id, imageUrl) {
  await sb.from("products").delete().eq("id", id);

  if (imageUrl) {
    const fileName = imageUrl.split("/").pop();

    await sb.storage
      .from("product-images")
      .remove([fileName]);
  }

  load();
}

async function logout() {
  await sb.auth.signOut();
  window.location.href = "login.html";
}

load();
</script>

</body>
</html>
