<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>

  <style>
    body { font-family: Arial; padding: 20px; background:#111; color:white; }
    input, textarea { display:block; margin:10px 0; padding:8px; width:300px; }
    .card { border:1px solid #333; padding:10px; margin:10px 0; }
    img { width:80px; }
    button { margin:5px; }
  </style>
</head>

<body>

<h1>Inventory System</h1>
<button onclick="logout()">Logout</button>

<hr>

<h2>Add Product</h2>

<input id="name" placeholder="Name">
<textarea id="desc" placeholder="Description"></textarea>
<input id="price" type="number" placeholder="Price">
<input id="stock" type="number" placeholder="Stock">
<input type="file" id="imageFile">

<button onclick="addProduct()">Add</button>

<h2>Products</h2>
<div id="list"></div>

<script>
const bucket = "product-images";

/* 🔐 AUTH CHECK */
async function checkAuth() {
  const { data } = await sb.auth.getUser();
  if (!data.user) window.location.href = "login.html";
}
checkAuth();

/* 📤 UPLOAD IMAGE */
async function uploadImage(file) {
  const fileName = Date.now() + "-" + file.name;

  const { error } = await sb.storage
    .from(bucket)
    .upload(fileName, file);

  if (error) return null;

  return sb.storage.from(bucket).getPublicUrl(fileName).data.publicUrl;
}

/* ➕ ADD PRODUCT */
async function addProduct() {
  const file = imageFile.files[0];
  const imageUrl = file ? await uploadImage(file) : null;

  await sb.from("products").insert([{
    name: name.value,
    description: desc.value,
    price: price.value,
    stock: stock.value,
    main_image: imageUrl
  }]);

  load();
}

/* 📦 LOAD */
async function load() {
  const { data } = await sb.from("products").select("*");

  list.innerHTML = data.map(p => `
    <div class="card">
      <img src="${p.main_image || ''}">
      <h3 contenteditable onblur="edit('${p.id}','name',this.innerText)">${p.name}</h3>
      <p contenteditable onblur="edit('${p.id}','description',this.innerText)">${p.description || ''}</p>

      <p>
        Price: <span contenteditable onblur="edit('${p.id}','price',this.innerText)">${p.price}</span>
      </p>

      <p>
        Stock: 
        <button onclick="stock('${p.id}',-1)">-</button>
        ${p.stock}
        <button onclick="stock('${p.id}',1)">+</button>
      </p>

      <button onclick="del('${p.id}')">Delete</button>
    </div>
  `).join("");
}

/* ✏️ EDIT INLINE */
async function edit(id, field, value) {
  await sb.from("products")
    .update({ [field]: value })
    .eq("id", id);
}

/* 📦 STOCK */
async function stock(id, change) {
  const { data } = await sb.from("products")
    .select("stock")
    .eq("id", id)
    .single();

  await sb.from("products")
    .update({ stock: data.stock + change })
    .eq("id", id);

  load();
}

/* 🗑 DELETE */
async function del(id) {
  await sb.from("products").delete().eq("id", id);
  load();
}

/* 🚪 LOGOUT */
async function logout() {
  await sb.auth.signOut();
  window.location.href = "login.html";
}

load();
</script>

</body>
</html>
