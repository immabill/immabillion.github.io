<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
            cursor: pointer;
        }

        /* Background */
        #bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Spinning image */
        #spin {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1300px;
            z-index: -1;
        }

        /* Countdown text */
        #countdown {
            position: absolute;
            top: 75%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-family: 'Courier New', monospace;
            text-shadow: 
                -1px -1px 0 black,
                1px -1px 0 black,
                -1px 1px 0 black,
                1px 1px 0 black;

            font-size: clamp(18px, 5vw, 48px);
            white-space: nowrap;
            text-align: center;
        }

        /* Tablet */
        @media (max-width: 1000px) {
            #spin {
                width: 900px;
            }
        }

        /* Phone */
        @media (max-width: 700px) {
            #spin {
                width: 650px;
            }
        }

        /* Small phone */
        @media (max-width: 400px) {
            #spin {
                width: 500px;
            }
        }
    </style>
</head>

<body>

<img id="bg" src="background.gif" alt="Background">
<img id="spin" src="spin.gif" alt="Spinning">

<div id="countdown">Loading...</div>

<script>
    // 🔥 TARGET DATE (May 7th, 2026 at 4PM Central Daylight Time)
    const targetDate = new Date("2026-05-07T16:00:00-05:00");

    const countdownEl = document.getElementById("countdown");

    function updateCountdown() {
        const now = new Date();
        const diff = targetDate - now;

        if (diff <= 0) {
            countdownEl.innerText = "[Enter]";
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        countdownEl.innerText = 
            `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    // Click to go to home page
    document.body.addEventListener("click", () => {
        window.location.href = "home.html";
    });
</script>

</body>
</html>
