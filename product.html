<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Product</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/admin/supabase.js"></script>

  <style>
    body {
      font-family: Arial;
      background:#111;
      color:white;
      padding:20px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      text-align: center;
    }

    #mainImg {
      width: 300px;
      height: 300px;
      object-fit: cover;
      border-radius: 10px;
    }

    .gallery {
      display:flex;
      justify-content:center;
      gap:10px;
      margin-top:15px;
      flex-wrap:wrap;
    }

    .gallery img {
      width:70px;
      height:70px;
      object-fit:cover;
      border-radius:6px;
      cursor:pointer;
      opacity:0.7;
    }

    .gallery img:hover {
      opacity:1;
    }

    button {
      padding:12px;
      margin-top:20px;
      cursor:pointer;
      font-size:16px;
    }
  </style>
</head>

<body>

<div class="container">
  <div id="product">Loading...</div>
</div>

<script>
const id = new URLSearchParams(window.location.search).get("id");

if (!id) {
  document.getElementById("product").innerHTML = "No product ID";
}

/* LOAD PRODUCT */
async function loadProduct() {

  const { data, error } = await window.sb
    .from("products")
    .select("*")
    .eq("id", id)
    .single();

  if (error || !data) {
    console.error(error);
    document.getElementById("product").innerHTML = "Product not found";
    return;
  }

  const images = [
    data.main_image,
    ...(data.images || [])
  ].filter(Boolean);

  document.getElementById("product").innerHTML = `
    <h1>${data.name || ''}</h1>

    <img id="mainImg" src="${data.main_image || ''}">

    <div class="gallery">
      ${images.map(img => `
        <img src="${img}" onclick="swapImage('${img}')">
      `).join("")}
    </div>

    <p>${data.description || ''}</p>

    <h2>$${data.price ?? 0}</h2>

    <p>Stock: ${data.stock ?? 0}</p>

    <button onclick="addToCart('${data.id}')">Add to Cart</button>
  `;
}

/* IMAGE SWITCH */
function swapImage(img) {
  document.getElementById("mainImg").src = img;
}

/* CART */
function addToCart(productId) {
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");
  cart.push(productId);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Added to cart");
}

loadProduct();
</script>

</body>
</html>
