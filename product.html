<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin/supabase.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#0d0d0d;
  color:white;
}

.container{
  max-width:1400px;
  margin:auto;
  padding:40px 24px;
  display:flex;
  gap:70px;
  flex-wrap:wrap;
  align-items:flex-start;
  justify-content:center;
}

.left{
  flex:1;
  min-width:320px;
  max-width:650px;
}

.main-img{
  width:100%;
  border-radius:18px;
  overflow:hidden;
  cursor:zoom-in;
  filter:drop-shadow(0px 0px 14px rgba(184,184,184,0.5));
}

.main-img img{
  width:100%;
  display:block;
  transition:transform 0.4s ease;
}

.main-img:hover img{
  transform:scale(1.08);
}

.gallery{
  display:flex;
  gap:12px;
  margin-top:18px;
  flex-wrap:wrap;
}

.gallery img{
  width:85px;
  height:85px;
  object-fit:cover;
  border-radius:10px;
  cursor:pointer;
  opacity:0.45;
  transition:0.2s;
  filter:drop-shadow(0px 0px 10px rgba(184,184,184,0.4));
}

.gallery img:hover{
  opacity:1;
  transform:scale(1.05);
}

.right{
  flex:1;
  min-width:300px;
  max-width:520px;
}

h1{
  font-size:clamp(32px,5vw,52px);
  margin-bottom:14px;
}

.price{
  font-size:clamp(28px,4vw,40px);
  margin:20px 0;
  font-weight:bold;
}

.desc{
  color:#ccc;
  line-height:1.8;
  margin-bottom:24px;
  font-size:clamp(15px,2vw,18px);
}

.stock{
  margin-bottom:24px;
  color:#aaa;
  font-size:18px;
}

button{
  width:100%;
  padding:18px;
  font-size:18px;
  background:white;
  color:black;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
  font-weight:bold;
}

button:hover{
  opacity:0.85;
  transform:scale(1.02);
}

.loading{
  text-align:center;
  margin-top:100px;
  font-size:24px;
}

@media (max-width:900px){

  .container{
    flex-direction:column;
    align-items:center;
    padding:24px 16px;
    gap:40px;
  }

  .left,
  .right{
    width:100%;
    max-width:100%;
  }

  .gallery{
    justify-content:center;
  }
}

@media (max-width:600px){

  .gallery img{
    width:70px;
    height:70px;
  }

  button{
    padding:16px;
    font-size:16px;
  }

  .desc{
    line-height:1.6;
  }
}
</style>
</head>

<body>

<div id="app" class="loading">Loading product...</div>

<script>
const id = new URLSearchParams(window.location.search).get("id");

async function loadProduct() {

  const { data, error } = await sb
    .from("products")
    .select("*")
    .eq("id", id)
    .single();

  if (error || !data) {
    document.getElementById("app").innerHTML = "Product not found";
    return;
  }

  const images = [
    data.main_image,
    ...(data.images || [])
  ].filter(Boolean);

  document.getElementById("app").innerHTML = `
    <div class="container">

      <div class="left">
        <div class="main-img">
          <img id="mainImg" src="${data.main_image}">
        </div>

        <div class="gallery">
          ${images.map(img => `
            <img src="${img}" onclick="setImage('${img}')">
          `).join("")}
        </div>
      </div>

      <div class="right">
        <h1>${data.name || ''}</h1>

        <div class="price">$${data.price ?? 0}</div>

        <div class="desc">${data.description || ''}</div>

        <div class="stock">Stock: ${data.stock ?? 0}</div>

        <button onclick="addToCart('${data.id}')">Add to Cart</button>
      </div>

    </div>
  `;
}

function setImage(img) {
  document.getElementById("mainImg").src = img;
}

function addToCart(id) {
  let cart = JSON.parse(localStorage.getItem("cart") || "[]");

  cart.push(id);

  localStorage.setItem("cart", JSON.stringify(cart));

  window.location.href = "cart.html";
}

loadProduct();
</script>

</body>
</html>
