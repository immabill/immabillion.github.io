<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="admin/supabase.js"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  padding:20px;
  background:#0f0f0f;
  color:white;
  font-family:Arial, sans-serif;
}

.container{
  width:100%;
  max-width:1300px;
  margin:auto;
  display:grid;
  grid-template-columns:1fr 380px;
  gap:25px;
}

.box{
  background:#1a1a1a;
  padding:28px;
  border-radius:18px;
}

h1{
  font-size:clamp(28px,4vw,42px);
  margin-bottom:20px;
}

h2{
  font-size:clamp(22px,3vw,30px);
  margin-bottom:18px;
}

input,
textarea{
  width:100%;
  padding:16px;
  margin-top:14px;
  background:#0f0f0f;
  border:1px solid #333;
  color:white;
  border-radius:12px;
  font-size:16px;
}

textarea{
  min-height:120px;
  resize:vertical;
}

.cart-item{
  display:flex;
  gap:14px;
  margin-bottom:18px;
  border-bottom:1px solid #333;
  padding-bottom:18px;
  align-items:center;
}

.cart-item img{
  width:90px;
  height:90px;
  object-fit:cover;
  border-radius:12px;
}

.cart-item div{
  font-size:15px;
  line-height:1.6;
}

.total{
  font-size:clamp(24px,3vw,34px);
  margin-top:18px;
  font-weight:bold;
}

button{
  padding:16px;
  margin-top:16px;
  width:100%;
  cursor:pointer;
  border:none;
  border-radius:12px;
  font-weight:bold;
  font-size:16px;
  transition:0.2s;
}

button:hover{
  transform:scale(1.02);
  opacity:0.9;
}

#testOrderBtn{
  background:#444;
  color:white;
}

@media (max-width:950px){

  body{
    padding:14px;
  }

  .container{
    grid-template-columns:1fr;
  }

  .box{
    padding:22px;
  }

  .cart-item img{
    width:75px;
    height:75px;
  }
}

@media (max-width:600px){

  h1{
    text-align:center;
  }

  .cart-item{
    gap:12px;
  }

  .cart-item img{
    width:70px;
    height:70px;
  }

  input,
  textarea,
  button{
    font-size:15px;
  }
}
</style>
</head>

<body>

<div class="container">

<div class="box">

<h1>Checkout</h1>

<input id="name" placeholder="Full Name">
<input id="email" placeholder="Email">
<textarea id="address" placeholder="Street Address (required)"></textarea>

<div id="paypal-button-container"></div>


</div>

<div class="box">

<h2>Your Cart</h2>
<div id="cartItems"></div>

<div class="total">
Total: $<span id="total">0</span>
</div>

</div>

</div>

<script src="https://www.paypal.com/sdk/js?client-id=AVVbJ_9rQ3B0VB-F133FV1yzMge2k129aAZR2jqFQ7LMVieoOsyPRbuDwcr_WMwP30T11t95Vy-eGwEI&currency=USD&intent=capture"></script>

<script>

let cartProducts = [];
let totalPrice = 0;

async function loadCart() {

  const cart = JSON.parse(localStorage.getItem("cart") || "[]");

  const { data } = await sb.from("products").select("*");

  cartProducts = (data || []).filter(p => cart.includes(p.id));

  totalPrice = 0;

  document.getElementById("cartItems").innerHTML =
    cartProducts.map(p => {
      totalPrice += Number(p.price);

      return `
        <div class="cart-item">
          <img src="${p.main_image || ''}">
          <div>
            <div>${p.name}</div>
            <div>$${p.price}</div>
            <div>Stock: ${p.stock}</div>
          </div>
        </div>
      `;
    }).join("");

  document.getElementById("total").innerText = totalPrice.toFixed(2);

  renderPayPal();
}

function validateCheckout() {

  const fullName = document.getElementById("name").value.trim();
  const emailInput = document.getElementById("email").value.trim();
  const addressInput = document.getElementById("address").value.trim();

  if (!fullName || !emailInput || !addressInput) {
    alert("Fill all fields");
    return false;
  }

  const regex = /^\d+\s+[A-Za-z0-9\s.,#-]+$/;

  if (!regex.test(addressInput)) {
    alert("Enter valid street address");
    return false;
  }

  return true;
}

async function checkStockBeforePay() {

  const ids = cartProducts.map(p => p.id);

  const { data, error } = await sb
    .from("products")
    .select("id, stock")
    .in("id", ids);

  if (error) return false;

  return data.every(p => Number(p.stock) > 0);
}

async function reduceStock() {

  for (const item of cartProducts) {

    const newStock = Math.max(0, Number(item.stock) - 1);

    await sb
      .from("products")
      .update({ stock: newStock })
      .eq("id", item.id);
  }
}

function renderPayPal() {

  const container = document.getElementById("paypal-button-container");

  container.innerHTML = "";

  paypal.Buttons({

    createOrder: async (data, actions) => {

      const ok = await checkStockBeforePay();

      if (!ok) {
        alert("One or more items are out of stock");
        throw new Error("Out of stock");
      }

      if (!validateCheckout()) {
        throw new Error("Invalid checkout");
      }

      return actions.order.create({
        purchase_units: [{
          amount: {
            value: totalPrice.toFixed(2)
          }
        }]
      });
    },

    onApprove: async (data, actions) => {

      const details = await actions.order.capture();

      const order = {
        items: cartProducts.map(p => ({
          id: p.id,
          name: p.name,
          price: Number(p.price),
          image: p.main_image,
          qty: 1
        })),

        total: totalPrice,
        status: "pending",

        paypal_order_id: data.orderID,
        paypal_payer_id: details.payer.payer_id,

        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        address: document.getElementById("address").value
      };

      const { error } = await sb.from("orders").insert([order]);

      if (error) {
        alert(error.message);
        return;
      }

      await reduceStock();

      localStorage.removeItem("cart");

      alert("Payment successful!");

      window.location.href = "/";
    }

  }).render("#paypal-button-container");
}

async function testOrder() {

  if (!validateCheckout()) return;

  const order = {
    items: cartProducts.map(p => ({
      id: p.id,
      name: p.name,
      price: Number(p.price),
      image: p.main_image,
      qty: 1
    })),

    total: totalPrice,
    status: "pending",

    paypal_order_id: "TEST",
    paypal_payer_id: "TEST",

    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    address: document.getElementById("address").value
  };

  const { error } = await sb.from("orders").insert([order]);

  if (error) {
    alert(error.message);
    return;
  }

  await reduceStock();

  alert("Test order created");

  localStorage.removeItem("cart");

  window.location.href = "/home";
}

loadCart();

</script>

</body>
</html>
